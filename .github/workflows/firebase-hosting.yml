name: Deploy to Firebase Hosting

# Publica public/ no Firebase Hosting (canal live) a cada push — SÓ se existir o secret
# FIREBASE_SERVICE_ACCOUNT. Sem o secret, o job 'deploy' é PULADO (skipped) — não falha e não
# manda e-mail de "Run failed". O site é publicado pela CLI `firebase deploy` (manual) + GitHub
# Pages (pages.yml). Pra ligar o auto-deploy no .web.app, adicione o secret: docs/DEPLOY-HOSTING.md.
#
# Por que dois jobs: o `secrets` não pode ser usado em `if:` de job, e uma action `uses:` inválida
# falha o job inteiro mesmo com `if` no step. Então o job `check` (sempre verde) decide via output,
# e o `deploy` (com a action de checkout) só é criado/rodado quando o secret existe.

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'firebase.json'
      - '.github/workflows/firebase-hosting.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_sa: ${{ steps.check.outputs.has_sa }}
    steps:
      - id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$SA" ]; then
            echo "has_sa=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sa=false" >> "$GITHUB_OUTPUT"
            echo "FIREBASE_SERVICE_ACCOUNT ausente — deploy via CLI/GitHub Pages; job 'deploy' será pulado."
          fi

  deploy:
    needs: check
    if: needs.check.outputs.has_sa == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Deploy pela firebase CLI (node já vem no runner) → sem action de terceiro.
      # Autentica via service account (GOOGLE_APPLICATION_CREDENTIALS → arquivo do secret).
      - name: Deploy to Firebase Hosting (live, via firebase CLI)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx -y firebase-tools@latest deploy --only hosting --project wealthy-tracker-68658 --non-interactive

name: Deploy to Firebase Hosting

# MANUAL-ONLY (workflow_dispatch) — NÃO roda a cada push.
#
# Por quê: o secret FIREBASE_SERVICE_ACCOUNT EXISTE no repo, então o auto-deploy no push
# RODAVA e FALHAVA (a service account não tem permissão de Firebase Hosting), mandando e-mail
# de "Run failed" a cada push. O site é publicado pelo `firebase deploy` (CLI logada no PC do
# dono) — esse é o método oficial (ver CLAUDE.md) — e pelo GitHub Pages (pages.yml).
#
# Pra RELIGAR o auto-deploy no push: (1) dê o papel "Firebase Hosting Admin" à service account
# do secret, valide com um `workflow_dispatch` manual, e (2) re-adicione `push:` no `on:` abaixo.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Deploy pela firebase CLI (node já vem no runner) → sem action de terceiro.
      - name: Deploy to Firebase Hosting (live, via firebase CLI)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Sem FIREBASE_SERVICE_ACCOUNT — nada a publicar."
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx -y firebase-tools@latest deploy --only hosting --project wealthy-tracker-68658 --non-interactive

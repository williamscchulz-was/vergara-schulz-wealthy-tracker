name = "ledger-i10-proxy"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Deploy: `wrangler deploy` from ./worker
# Dev:    `wrangler dev`    from ./worker

# Cron (PARKED — NÃO ativado). O handler scheduled() existe no código,
# mas o gatilho está DESLIGADO: o app atualiza ao abrir (auto-sync), o
# que já atende. Pra ligar a sync diária 08:00 BRT (11:00 UTC) sem
# ninguém abrir o app, descomente o bloco abaixo, crie o secret
# FIREBASE_SA e rode `wrangler deploy`. Passo a passo em
# ../docs/DEPLOY-WORKER.md.
#
# [triggers]
# crons = ["0 11 * * *"]
#   FIREBASE_SA = <JSON inteiro da service account do Firebase>

name = "ledger-i10-proxy"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Deploy: `wrangler deploy` from ./worker
# Dev:    `wrangler dev`    from ./worker

# Cron: sync diário 08:00 BRT (UTC-3) = 11:00 UTC. O handler scheduled()
# busca o I10 e grava em config/i10, config/i10-louise, config/fx usando
# a service account do Firebase (secret FIREBASE_SA).
[triggers]
crons = ["0 11 * * *"]

# Secret necessário (NÃO vai no repo — setar no dashboard ou via
# `wrangler secret put FIREBASE_SA`):
#   FIREBASE_SA = <JSON inteiro da service account do Firebase>
# Ver ../docs/DEPLOY-WORKER.md (seção Cron) pro passo a passo.

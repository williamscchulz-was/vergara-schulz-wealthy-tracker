<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ledger · Metas (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --bg:#29262B;--bg-2:#322c37;
  --ink:#fafafa;--ink-2:#d4cfd9;--ink-3:#9c95a6;--ink-muted:#6b6473;
  --purple:#AC5FDB;--gain:#34e17a;--warn:#ffb340;
  --track:color-mix(in oklab,var(--ink-3) 16%,transparent);
  --ease:cubic-bezier(.16,1,.3,1);
}
:root[data-theme="light"]{
  --bg:#ebe0f7;--bg-2:rgba(255,255,255,.5);
  --ink:#1a0d2e;--ink-2:#3d2856;--ink-3:#6b5680;--ink-muted:#9b8ab3;
  --purple:#9333ea;--gain:#16a34a;--warn:#d97706;
}
body{font-family:Inter,system-ui,sans-serif;color:var(--ink);min-height:100vh;position:relative;-webkit-font-smoothing:antialiased;font-size:14px}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:var(--bg)}
:root[data-theme="light"] body::before{background:
  radial-gradient(ellipse 70% 50% at 15% 10%,#fdf4ec 0%,transparent 55%),
  radial-gradient(ellipse 60% 55% at 85% 20%,#f7e7f6 0%,transparent 60%),
  radial-gradient(ellipse 80% 60% at 50% 100%,#f1e8fb 0%,transparent 70%),#ebe0f7}

.wrap{max-width:680px;margin:0 auto;padding:64px 28px 120px}
.top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
h1{font-size:20px;font-weight:600;letter-spacing:-.01em;margin:0}
.theme{border:none;background:transparent;color:var(--ink-3);cursor:pointer;font-size:15px;padding:4px;line-height:1}
.theme:hover{color:var(--ink)}
.note{margin:0 0 52px;color:var(--ink-muted);font-size:12px}
.note .mk{display:inline-block;width:1.5px;height:11px;background:var(--ink-3);vertical-align:-1px;margin-right:5px}

.goal{margin-bottom:30px}
.goal.gap{margin-bottom:46px}
.g-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:11px}
.g-name{font-size:14px;font-weight:500;letter-spacing:-.01em}
.g-num{font-family:'Geist Mono',monospace;font-size:13px;color:var(--ink);white-space:nowrap}
.g-num small{color:var(--ink-3);font-weight:400}
.g-line{display:flex;align-items:center;gap:13px}
.gbar{position:relative;flex:1;height:5px;border-radius:4px;background:var(--track)}
.gbar-fill{height:100%;border-radius:4px;transition:width 1s var(--ease)}
.gbar-fill.ahead{background:var(--gain)}.gbar-fill.ontrack{background:var(--purple)}.gbar-fill.behind{background:var(--warn)}
.gbar-marker{position:absolute;top:-3px;bottom:-3px;width:1.5px;background:var(--ink-3);border-radius:2px}
.g-year{font-family:'Geist Mono',monospace;font-size:11px;color:var(--ink-muted);width:30px;text-align:right;flex-shrink:0}

.add{margin-top:8px;color:var(--ink-muted);font-size:12.5px;cursor:pointer;display:inline-block}
.add:hover{color:var(--purple)}
@media(max-width:560px){.wrap{padding:44px 20px 80px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Metas</h1>
    <button class="theme" id="themeBtn" title="Tema">◐</button>
  </div>
  <p class="note"><span class="mk"></span>a marca é o ritmo necessário pra bater no prazo</p>

  <div id="list"></div>
  <span class="add">+ nova meta</span>
</div>

<script>
const NOW=2026;
const fmtN=n=>(+n).toLocaleString('pt-BR');
const compact=n=>{n=+n;if(n>=1e6)return 'R$ '+(n/1e6).toLocaleString('pt-BR',{maximumFractionDigits:2})+'M';if(n>=1e3)return 'R$ '+(n/1e3).toLocaleString('pt-BR',{maximumFractionDigits:0})+'K';return 'R$ '+fmtN(n);};
const classify=(f,m)=>{const d=f-m;return d>=5?'ahead':d<=-5?'behind':'ontrack';};

const goals=[
  { name:'Renda em dividendos', num:compact(218000)+' <small>/ '+compact(1000000)+'·ano</small>', cur:218000, tgt:1000000, start:2024, year:2035, gap:true },
  { name:'BBAS3', num:fmtN(12450)+' <small>/ '+fmtN(20000)+'</small>', cur:12450, tgt:20000, start:2024, year:2030 },
  { name:'BBSE3', num:fmtN(6500)+' <small>/ '+fmtN(20000)+'</small>',  cur:6500,  tgt:20000, start:2024, year:2030 },
  { name:'CXSE3', num:fmtN(4100)+' <small>/ '+fmtN(20000)+'</small>',  cur:4100,  tgt:20000, start:2024, year:2030 },
  { name:'RANI3', num:fmtN(9800)+' <small>/ '+fmtN(20000)+'</small>',  cur:9800,  tgt:20000, start:2024, year:2030 },
];

document.getElementById('list').innerHTML = goals.map(g=>{
  const fill=g.cur/g.tgt*100, mark=(NOW-g.start)/(g.year-g.start)*100;
  const st=classify(fill,mark);
  return `<div class="goal${g.gap?' gap':''}">
    <div class="g-row"><span class="g-name">${g.name}</span><span class="g-num">${g.num}</span></div>
    <div class="g-line">
      <div class="gbar"><div class="gbar-fill ${st}" style="width:${Math.max(2,Math.min(100,fill))}%"></div><div class="gbar-marker" style="left:${Math.max(0,Math.min(100,mark))}%"></div></div>
      <span class="g-year">${g.year}</span>
    </div>
  </div>`;
}).join('');

document.getElementById('themeBtn').addEventListener('click',()=>{const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='light'?'dark':'light');});
</script>
</body>
</html>

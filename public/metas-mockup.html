<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ledger · Metas (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --bg:#29262B;--bg-2:#322c37;
  --ink:#fafafa;--ink-2:#d4cfd9;--ink-3:#9c95a6;--ink-muted:#6b6473;
  --purple:#AC5FDB;--gain:#34e17a;--warn:#ffb340;
  --track:color-mix(in oklab,var(--ink-3) 16%,transparent);
  --ease:cubic-bezier(.16,1,.3,1);
}
:root[data-theme="light"]{
  --bg:#ebe0f7;--bg-2:rgba(255,255,255,.5);
  --ink:#1a0d2e;--ink-2:#3d2856;--ink-3:#6b5680;--ink-muted:#9b8ab3;
  --purple:#9333ea;--gain:#16a34a;--warn:#d97706;
}
body{font-family:Inter,system-ui,sans-serif;color:var(--ink);min-height:100vh;position:relative;-webkit-font-smoothing:antialiased;font-size:14px}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:var(--bg)}
:root[data-theme="light"] body::before{background:
  radial-gradient(ellipse 70% 50% at 15% 10%,#fdf4ec 0%,transparent 55%),
  radial-gradient(ellipse 60% 55% at 85% 20%,#f7e7f6 0%,transparent 60%),
  radial-gradient(ellipse 80% 60% at 50% 100%,#f1e8fb 0%,transparent 70%),#ebe0f7}

.wrap{max-width:680px;margin:0 auto;padding:64px 28px 120px}
.top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
h1{font-size:20px;font-weight:600;letter-spacing:-.01em;margin:0}
.theme{border:none;background:transparent;color:var(--ink-3);cursor:pointer;font-size:15px;padding:4px;line-height:1}
.theme:hover{color:var(--ink)}
.note{margin:0 0 52px;color:var(--ink-muted);font-size:12px}
.note .mk{display:inline-block;width:1.5px;height:11px;background:var(--ink-3);vertical-align:-1px;margin-right:5px}

.goal{position:relative;margin-bottom:30px}
.goal.gap{margin-bottom:46px}
.g-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:11px}
.g-name{font-size:14px;font-weight:500;letter-spacing:-.01em}
.g-num{font-family:'Geist Mono',monospace;font-size:13px;color:var(--ink);white-space:nowrap}
.g-num small{color:var(--ink-3);font-weight:400}
.g-line{display:flex;align-items:center;gap:13px}
.gbar{position:relative;flex:1;height:5px;border-radius:4px;background:var(--track)}
.gbar-fill{height:100%;border-radius:4px;transition:width .5s var(--ease),background .3s}
.gbar-fill.ahead{background:var(--gain)}.gbar-fill.ontrack{background:var(--purple)}.gbar-fill.behind{background:var(--warn)}
.gbar-marker{position:absolute;top:-3px;bottom:-3px;width:1.5px;background:var(--ink-3);border-radius:2px;transition:left .5s var(--ease)}
.g-year{font-family:'Geist Mono',monospace;font-size:11px;color:var(--ink-muted);width:34px;text-align:right;flex-shrink:0}

/* edição inline — discreta: pontilhado no hover, vira input no clique */
.edit{cursor:text;border-bottom:1px dotted transparent;transition:border-color .15s}
.edit:hover{border-bottom-color:var(--ink-3)}
.edit-in{font:inherit;color:var(--purple);background:transparent;border:none;border-bottom:1px solid var(--purple);outline:none;padding:0;margin:0;text-align:inherit}
.g-name .edit-in{color:var(--purple);font-weight:500}

.g-del{position:absolute;top:0;right:-22px;width:18px;height:18px;display:grid;place-items:center;border:none;background:transparent;color:var(--ink-muted);cursor:pointer;opacity:0;font-size:15px;line-height:1;transition:opacity .15s,color .15s}
.goal:hover .g-del{opacity:.6}
.g-del:hover{opacity:1;color:var(--warn)}

.add{margin-top:8px;color:var(--ink-muted);font-size:12.5px;cursor:pointer;display:inline-block;user-select:none}
.add:hover{color:var(--purple)}
@media(max-width:560px){.wrap{padding:44px 20px 80px}.g-del{right:-4px;opacity:.5}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Metas</h1>
    <button class="theme" id="themeBtn" title="Tema">◐</button>
  </div>
  <p class="note"><span class="mk"></span>a marca é o ritmo necessário · toque nos valores pra editar</p>

  <div id="list"></div>
  <span class="add" id="addBtn">+ nova meta</span>
</div>

<script>
const NOW=2026;
const fmtN=n=>(+n).toLocaleString('pt-BR');
const compact=n=>{n=+n;if(n>=1e6)return 'R$ '+(n/1e6).toLocaleString('pt-BR',{maximumFractionDigits:2})+'M';if(n>=1e3)return 'R$ '+(n/1e3).toLocaleString('pt-BR',{maximumFractionDigits:0})+'K';return 'R$ '+fmtN(n);};
const classify=(f,m)=>{const d=f-m;return d>=5?'ahead':d<=-5?'behind':'ontrack';};

const DEFAULTS=[
  { id:'div', type:'dividends', name:'Renda em dividendos', cur:218000, tgt:1000000, start:2024, year:2035, gap:true },
  { id:'bbas', type:'shares', name:'BBAS3', cur:12450, tgt:20000, start:2024, year:2030 },
  { id:'bbse', type:'shares', name:'BBSE3', cur:6500,  tgt:20000, start:2024, year:2030 },
  { id:'cxse', type:'shares', name:'CXSE3', cur:4100,  tgt:20000, start:2024, year:2030 },
  { id:'rani', type:'shares', name:'RANI3', cur:9800,  tgt:20000, start:2024, year:2030 },
];
let goals;
try{ goals = JSON.parse(localStorage.getItem('metasMock')) || DEFAULTS; }catch(e){ goals = DEFAULTS; }
const save=()=>localStorage.setItem('metasMock', JSON.stringify(goals));

const list=document.getElementById('list');
function render(){
  list.innerHTML = goals.map(g=>{
    const fill=g.cur/g.tgt*100, mark=(NOW-g.start)/((g.year-g.start)||1)*100;
    const st=classify(fill,mark);
    // dividendos: alvo editável (quantidade), prazo TRAVADO. ações: tudo editável.
    const nameHtml = g.type==='shares' ? `<span class="g-name"><span class="edit" data-f="name">${g.name}</span></span>` : `<span class="g-name">${g.name}</span>`;
    const numHtml = g.type==='dividends'
      ? `<span class="g-num">${compact(g.cur)} <small>/ <span class="edit" data-f="tgt">${compact(g.tgt)}</span> · ano</small></span>`
      : `<span class="g-num">${fmtN(g.cur)} <small>/ <span class="edit" data-f="tgt">${fmtN(g.tgt)}</span></small></span>`;
    const yearHtml = g.type==='dividends'
      ? `<span class="g-year" title="prazo fixo">${g.year}</span>`
      : `<span class="g-year edit" data-f="year">${g.year}</span>`;
    return `<div class="goal${g.gap?' gap':''}" data-id="${g.id}">
      <button class="g-del" title="remover">×</button>
      <div class="g-row">${nameHtml}${numHtml}</div>
      <div class="g-line">
        <div class="gbar"><div class="gbar-fill ${st}" style="width:${Math.max(2,Math.min(100,fill))}%"></div><div class="gbar-marker" style="left:${Math.max(0,Math.min(100,mark))}%"></div></div>
        ${yearHtml}
      </div>
    </div>`;
  }).join('');
}

// edição inline
list.addEventListener('click', e=>{
  const del=e.target.closest('.g-del');
  if(del){ const id=del.closest('.goal').dataset.id; goals=goals.filter(g=>g.id!==id); save(); render(); return; }
  const el=e.target.closest('.edit');
  if(!el || el.querySelector('input')) return;
  const g=goals.find(x=>x.id===el.closest('.goal').dataset.id); if(!g) return;
  const f=el.dataset.f;
  const raw = f==='name' ? g.name : String(g[f]);
  const input=document.createElement('input');
  input.className='edit-in'; input.value=raw;
  input.style.width=Math.max(2,(raw.length+1))+'ch';
  if(f!=='name') input.inputMode='numeric';
  el.textContent=''; el.appendChild(input); input.focus(); input.select();
  let done=false;
  const commit=()=>{
    if(done) return; done=true;
    let v=input.value.trim();
    if(f==='name'){ g.name = v.toUpperCase() || g.name; }
    else { const n=parseInt(v.replace(/\D/g,''),10); if(isFinite(n)&&n>0) g[f]=n; }
    if(f==='year' && g.year<=g.start) g.year=g.start+1;  // prazo precisa ser futuro do início
    save(); render();
  };
  input.addEventListener('blur',commit);
  input.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ev.preventDefault();input.blur();} if(ev.key==='Escape'){done=true;render();} });
});

document.getElementById('addBtn').addEventListener('click',()=>{
  goals.push({ id:'g'+(goals.length)+Math.floor(performance.now()), type:'shares', name:'TICK3', cur:0, tgt:10000, start:NOW, year:NOW+5 });
  save(); render();
  // foca direto no nome da nova meta pra renomear
  const rows=list.querySelectorAll('.goal'); const last=rows[rows.length-1]; last.querySelector('.edit')?.click();
});
document.getElementById('themeBtn').addEventListener('click',()=>{const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='light'?'dark':'light');});

render();
</script>
</body>
</html>

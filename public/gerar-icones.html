<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ledger · gerar ícones</title>
<style>
  body{font-family:-apple-system,Inter,system-ui,sans-serif;background:#0a0c08;color:#f3f4ee;margin:0;padding:32px;line-height:1.5}
  h1{font-size:20px;margin:0 0 4px}p{color:#b9bbae;margin:0 0 20px;font-size:14px}
  button{font:600 15px inherit;background:#c7f73e;color:#15170b;border:0;border-radius:12px;padding:13px 22px;cursor:pointer}
  button:hover{background:#d8fa72}
  .grid{display:flex;flex-wrap:wrap;gap:14px;margin-top:24px}
  .ic{text-align:center;font-size:11px;color:#80827a}.ic canvas{display:block;border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:6px;background:#14180f}
  .ok{color:#4fdd8a}
</style></head>
<body>
<h1>Gerar ícones do Ledger (logo de 7 flechas)</h1>
<p>Clica no botão → baixa os 8 PNGs pra sua pasta de Downloads. Depois é só jogar todos em <code>public/assets/icons/</code> (substituindo os antigos) e me avisar que eu comito.</p>
<button id="dl">⬇ Baixar todos os ícones</button>
<span id="status" style="margin-left:14px"></span>
<div class="grid" id="preview"></div>
<script>
  var CHEV = '<g fill="none" stroke="#c7f73e" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" transform="translate(5.84 5.84) scale(1.84)"><path d="M7 13 L24 5 L41 13 M7 18 L24 10 L41 18 M7 23 L24 15 L41 23 M7 28 L24 20 L41 28 M7 33 L24 25 L41 33 M7 38 L24 30 L41 38 M7 43 L24 35 L41 43"/></g>';
  var SVG_REG  = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="24" fill="#131410"/>'+CHEV+'</svg>';
  var SVG_MASK = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#131410"/>'+CHEV+'</svg>';
  var ICONS = [['reg',192,'icon-192.png'],['reg',512,'icon-512.png'],['mask',192,'icon-maskable-192.png'],['mask',512,'icon-maskable-512.png'],['reg',180,'apple-touch-icon.png'],['reg',180,'icon-180.png'],['reg',32,'favicon-32.png'],['reg',16,'favicon-16.png']];
  function render(variant,size,cb){
    var svg=(variant==='mask'?SVG_MASK:SVG_REG).replace('<svg ','<svg width="'+size+'" height="'+size+'" ');
    var img=new Image();
    img.onload=function(){var c=document.createElement('canvas');c.width=size;c.height=size;c.getContext('2d').drawImage(img,0,0,size,size);cb(c);};
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
  }
  // preview (tamanho fixo 72px pra visual)
  ICONS.forEach(function(it){render(it[0],128,function(c){var box=document.createElement('div');box.className='ic';var p=document.createElement('canvas');p.width=72;p.height=72;p.getContext('2d').drawImage(c,0,0,72,72);box.appendChild(p);box.appendChild(document.createTextNode(it[2]));document.getElementById('preview').appendChild(box);});});
  document.getElementById('dl').onclick=function(){
    var st=document.getElementById('status');st.textContent='baixando…';var done=0;
    ICONS.forEach(function(it,i){
      setTimeout(function(){
        render(it[0],it[1],function(c){
          c.toBlob(function(b){
            var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=it[2];document.body.appendChild(a);a.click();a.remove();
            setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
            done++;if(done===ICONS.length){st.innerHTML='<span class="ok">✓ '+done+' ícones baixados!</span>';}
          },'image/png');
        });
      },i*500);
    });
  };
</script></body></html>

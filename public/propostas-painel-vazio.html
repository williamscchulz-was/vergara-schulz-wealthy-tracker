<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ledger · Proposta — vazio do card de lançamentos (Painel)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Geist+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --pg:#f3efe7; --ink:#2a2620; --ink2:#6b6256; --ink3:#6f6657; --inkm:#837767; --card:#fffdf9; --border:#e7ddcb; --el2:#f4eee2; --el3:#faf6ee; --green:#2fae5f; --green-deep:#1f8f4a; --green-soft:rgba(47,174,95,.08); }
  *{box-sizing:border-box}
  body{margin:0;background:var(--pg);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.4;padding:24px 16px 80px}
  .wrap{max-width:1180px;margin:0 auto}
  h1{font-size:23px;letter-spacing:-.02em;margin:0 0 4px;display:flex;align-items:center;gap:10px}
  .v{font:700 10px Inter;background:var(--green-soft);color:var(--green-deep);border:1px solid var(--border);padding:3px 8px;border-radius:999px}
  .lead{color:var(--ink2);font-size:14px;margin:0 0 14px}
  .lead b{color:var(--ink)}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:4px;gap:3px;margin-bottom:18px}
  .seg button{border:0;background:transparent;color:var(--ink2);font:600 13px Inter;padding:8px 15px;border-radius:999px;cursor:pointer}
  .seg button.on{background:var(--green);color:#fff}
  /* o grid do Painel: 5fr / 7fr, igual ao app */
  .panel-grid{display:grid;grid-template-columns:5fr 7fr;gap:16px;align-items:stretch}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 16px 12px;box-shadow:0 1px 2px rgba(20,40,24,.04),0 8px 22px -14px rgba(20,40,24,.2);min-width:0}
  .card-h{font-size:14px;font-weight:700;margin-bottom:12px}
  .card-h .meta{font-size:11.5px;color:var(--ink3);font-weight:500}
  /* categorias (esquerda) */
  .cat-row{display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:center;padding:7px 4px}
  .cat-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:13px}
  .cat-mid{min-width:0}
  .cat-nm{font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:5px}
  .cat-bar{height:6px;border-radius:3px;background:var(--el2);overflow:hidden}
  .cat-bar i{display:block;height:100%;border-radius:3px}
  .cat-r{text-align:right;white-space:nowrap}
  .cat-pct{font:700 11px Inter;color:var(--ink2)}
  .cat-val{font:600 11px 'Geist Mono',monospace;color:var(--ink3);margin-top:2px}
  /* tabela de lançamentos (direita) */
  .t-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .t-cnt{font:700 11px Inter;letter-spacing:.04em;color:var(--ink3)}
  .t-tot{font:800 17px 'Geist Mono',monospace}
  .thead{display:grid;grid-template-columns:54px 1fr 130px 96px;gap:10px;padding:0 8px 8px;border-bottom:1px solid var(--border);font:600 10px Inter;letter-spacing:.06em;text-transform:uppercase;color:var(--inkm)}
  .thead .r{text-align:right}
  .trow{display:grid;grid-template-columns:54px 1fr 130px 96px;gap:10px;align-items:center;padding:4px 8px;border-bottom:1px solid var(--border);cursor:pointer}
  .trow:hover{background:rgba(47,174,95,.03)}
  .t-date{font:500 11px 'Geist Mono',monospace;color:var(--ink3)}
  .t-desc{min-width:0}
  .t-dl{display:flex;align-items:center;gap:6px;min-width:0}
  .t-dt{font-size:12px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:30px}
  .t-notes{font:500 10px 'Geist Mono',monospace;color:var(--inkm);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip{font:700 8.5px Inter;padding:1px 6px;border-radius:999px;border:1px solid;white-space:nowrap;flex-shrink:0}
  .chip.fam{color:var(--green-deep);background:var(--green-soft);border-color:rgba(47,174,95,.3)}
  .chip.w{color:#1f7ab8;background:rgba(100,210,255,.14);border-color:rgba(100,210,255,.4)}
  .chip.f{color:#c43f93;background:rgba(255,107,214,.12);border-color:rgba(255,107,214,.36)}
  .badge{font:700 8px Inter;text-transform:uppercase;letter-spacing:.04em;color:var(--green-deep);background:var(--green-soft);border:1px solid rgba(47,174,95,.45);border-radius:5px;padding:1px 5px;white-space:nowrap;flex-shrink:0}
  .pill{display:inline-flex;align-items:center;gap:5px;font:600 11px Inter;padding:4px 9px;border-radius:8px;white-space:nowrap;justify-self:start}
  .pill .ic{width:7px;height:7px;border-radius:2px}
  .t-val{font:700 12px 'Geist Mono',monospace;text-align:right;white-space:nowrap}
  .vertodas{display:block;width:100%;text-align:center;font:700 11px Inter;letter-spacing:.05em;color:var(--ink2);background:transparent;border:0;padding:14px 0 6px;cursor:pointer}
  /* variantes */
  .v-stretch .exp-g-table{align-self:stretch}
  .v-hug .exp-g-table{align-self:start}
  .note{font-size:12px;color:var(--ink3);margin-top:10px;text-align:center}
  .note b{color:var(--green-deep)}
  .foot{text-align:center;color:var(--ink3);font-size:13px;margin-top:26px;line-height:1.7}
  .foot b{color:var(--ink2)}
  @media(max-width:820px){ .panel-grid{grid-template-columns:1fr} }
</style></head>
<body><div class="wrap">

<h1>Aquele vazião do Painel <span class="v">Ledger</span></h1>
<p class="lead">Hoje o card de lançamentos <b>estica</b> pra igualar a altura do card de categorias (bem mais alto) — sobra um vazio enorme embaixo do "Ver todas". Duas saídas:</p>

<div class="seg">
  <button data-mode="stretch">Atual (o problema)</button>
  <button data-mode="hug" class="on">A · Encolhe ★</button>
  <button data-mode="fill">B · Enche</button>
</div>

<div id="stage"></div>
<div class="note" id="note"></div>

<div class="foot">Me diz: <b>A</b> (card encolhe, encosta no conteúdo) ou <b>B</b> (mostra mais recentes pra encher e equilibrar as colunas)? ✌️</div>

</div>
<script>
  const CATS=[
    ['Outros',22,7324,'#8e8e93','▦'],['Viagem',17,5629,'#5856d6','✈'],['Moradia',17,5614,'#0071e3','⌂'],
    ['Compras',14,4712,'#caa406','▣'],['Saúde',8,2631,'#ff375f','♥'],['Pessoal Flávia',5,1687,'#d98a1f','▤'],
    ['Pessoal William',4,1400,'#00a3a3','▤'],['Presentes',4,1375,'#30a14e','◆'],['Mercado',2,498,'#00b3aa','▥'],
    ['Doações',1,478,'#e0772f','♥'],['Alimentação',1,402,'#30a14e','♨'],['Assinaturas',1,333,'#a64ad4','↻'],
    ['Educação',1,223,'#3aa6d4','▱'],['Lazer',1,206,'#9a52de','◐'],['Uber',0,82,'#777','▸'],
  ];
  const ROWS=[
    ['ter, 16','Ademicon 02','fam','FIXA','','Outros','#8e8e93','3.169,34'],
    ['15/06','LATAM AIR*HIYLFO','fam','PROVISÃO','cartão: WILLIAM · 2/4','Viagem','#5856d6','1.039,55'],
    ['15/06','AMAZON MARKETPLACE','w','PROVISÃO','cartão: WILLIAM · 3/3','Presentes','#30a14e','362,75'],
    ['15/06','BIO ESTHETIC LTDA','f','PROVISÃO','cartão: FLAVIA · 2/2','Pessoal Flávia','#d98a1f','312,50'],
    ['15/06','LATAM AIR*EFGCNY','fam','PROVISÃO','cartão: WILLIAM · 2/4','Viagem','#5856d6','1.497,03'],
    ['15/06','Shein *SHEINCOM','f','PROVISÃO','cartão: FLAVIA · 2/2','Pessoal Flávia','#d98a1f','163,66'],
    ['15/06','JIM.COM VITOR LOSS','fam','PROVISÃO','cartão: WILLIAM · 3/6','Moradia','#0071e3','891,70'],
    ['14/06','Celesc','fam','FIXA','','Moradia','#0071e3','120,70'],
    ['14/06','Pediatra','f','','','Saúde','#ff375f','350,00'],
    ['12/06','Lavação Tera','f','','Pix Gustavo','Moradia','#0071e3','70,00'],
    ['12/06','Energia Solar','fam','','','Moradia','#0071e3','320,00'],
    ['10/06','Apple','fam','','via cartão','Assinaturas','#a64ad4','99,99'],
    ['10/06','Passagem Mexico','fam','','','Viagem','#5856d6','1.595,44'],
    ['09/06','Mercado Pão','fam','','via cartão','Mercado','#00b3aa','243,18'],
    ['08/06','Farmácia SP','w','','via cartão','Saúde','#ff375f','88,40'],
  ];
  const OLBL={fam:'Fam',w:'W',f:'F'};
  function tint(hex,a){const n=parseInt(hex.slice(1),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
  function catCard(){
    const rows=CATS.map(c=>`<div class="cat-row">
      <div class="cat-ic" style="color:${c[3]};background:${tint(c[3],.13)}">${c[4]}</div>
      <div class="cat-mid"><div class="cat-nm">${c[0]}</div><div class="cat-bar"><i style="width:${Math.max(4,c[1]*4.3)}%;background:${c[3]}"></i></div></div>
      <div class="cat-r"><div class="cat-pct">${c[1]}%</div><div class="cat-val">R$ ${c[2].toLocaleString('pt-BR')}</div></div>
    </div>`).join('');
    return `<div class="card exp-g-cat"><div class="card-h">Por categoria <span class="meta">· Junho 2026</span></div>${rows}</div>`;
  }
  function tableCard(n){
    const rows=ROWS.slice(0,n).map(r=>{
      const badge=r[3]?`<span class="badge">${r[3]}</span>`:'';
      const notes=r[4]?`<div class="t-notes">${r[4]}</div>`:'';
      return `<div class="trow">
        <div class="t-date">${r[0]}</div>
        <div class="t-desc"><div class="t-dl"><span class="t-dt">${r[1]}</span><span class="chip ${r[2]}">${OLBL[r[2]]}</span>${badge}</div>${notes}</div>
        <div class="pill" style="color:${r[6]};background:${tint(r[6],.12)}"><span class="ic" style="background:${r[6]}"></span>${r[5]}</div>
        <div class="t-val">R$ ${r[7]}</div>
      </div>`;
    }).join('');
    return `<div class="card exp-g-table">
      <div class="card-h">Todas as despesas do mês <span class="meta">· Clique numa linha pra editar</span></div>
      <div class="t-top"><span class="t-cnt">108 LANÇAMENTOS</span><span class="t-tot">R$ 32.594,07</span></div>
      <div class="thead"><span>DATA</span><span>DESCRIÇÃO</span><span>CATEGORIA</span><span class="r">VALOR</span></div>
      ${rows}
      <button class="vertodas">VER TODAS (108)</button>
    </div>`;
  }
  const MODES={
    stretch:{cls:'v-stretch',n:8, note:'<b>Atual:</b> o card estica e fica aquele vazio embaixo.'},
    hug:    {cls:'v-hug',    n:8, note:'<b>A · Encolhe:</b> o card encosta no conteúdo (8 recentes). Sem vazio — a coluna direita só fica mais curta.'},
    fill:   {cls:'v-hug',    n:15,note:'<b>B · Enche:</b> mostra ~15 recentes (linhas slim) pra encher e equilibrar com as categorias.'},
  };
  function render(mode){
    const M=MODES[mode];
    document.getElementById('stage').innerHTML=`<div class="panel-grid ${M.cls}">${catCard()}${tableCard(M.n)}</div>`;
    document.getElementById('note').innerHTML=M.note;
    document.querySelectorAll('.seg button').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  }
  document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.mode)));
  render('hug');
</script>
</body></html>

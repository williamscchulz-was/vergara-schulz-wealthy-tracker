<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ledger — Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0c08;--bar:#11140d;--ink:#f3f6ec;--ink2:#9aa088;--line:rgba(255,255,255,.08);
    --lime:#bdf63f;--on-lime:#101604}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;height:100dvh;-webkit-font-smoothing:antialiased;overflow:hidden}
  header{flex:0 0 auto;background:var(--bar);border-bottom:1px solid var(--line)}
  .row1{display:flex;align-items:center;gap:11px;padding:11px clamp(12px,3vw,22px) 0}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--lime),#9fd62e);
    display:grid;place-items:center;color:var(--on-lime);font-weight:800;font-size:16px}
  .ttl{font-weight:800;font-size:16px;letter-spacing:-.01em}
  .ttl small{display:block;font-weight:500;font-size:11px;color:var(--ink2)}
  .open{margin-left:auto;font-size:12px;font-weight:700;color:var(--lime);text-decoration:none;border:1px solid var(--line);
    padding:7px 12px;border-radius:999px;white-space:nowrap}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:12px clamp(12px,3vw,22px);scrollbar-width:thin}
  .chips::-webkit-scrollbar{height:5px}.chips::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
  .chip{flex:0 0 auto;font:600 13px inherit;color:var(--ink2);background:#171b10;border:1px solid var(--line);
    padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.18s}
  .chip:hover{color:var(--ink)}
  .chip.on{background:var(--lime);color:var(--on-lime);border-color:transparent;box-shadow:0 6px 16px -8px rgba(189,246,63,.5)}
  .chip.sep{pointer-events:none;opacity:.5;color:var(--ink2);background:transparent;border:0;padding:8px 2px}
  .frameWrap{flex:1 1 auto;position:relative;background:var(--bg)}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
  .load{position:absolute;inset:0;display:grid;place-items:center;color:var(--ink2);font-size:13px;pointer-events:none;opacity:0;transition:.2s}
  .frameWrap.loading .load{opacity:1}
</style>
</head>
<body>
  <header>
    <div class="row1">
      <div class="logo">L</div>
      <div class="ttl">Ledger · Mockups <small>toque numa aba — tudo abre aqui dentro</small></div>
      <a class="open" id="openNew" href="#" target="_blank">Abrir em tela cheia ↗</a>
    </div>
    <div class="chips" id="chips">
      <button class="chip on" data-src="despesas-mockup.html">Despesas (novo)</button>
      <button class="chip" data-src="resumo-mockup.html">Resumo (novo)</button>
      <button class="chip" data-src="redesign-mockup.html?skin=aurora">Aurora · claro</button>
      <button class="chip" data-src="redesign-mockup.html?skin=obsidian">Obsidian · escuro</button>
      <button class="chip" data-src="redesign-mockup.html?skin=linen">Linen · warm</button>
      <button class="chip" data-src="redesign-mockup.html">Comparador</button>
      <span class="chip sep">·</span>
      <button class="chip" data-src="invest-mockup.html">Investimentos</button>
      <button class="chip" data-src="invest-mockup-dark.html">Invest · dark</button>
      <button class="chip" data-src="ledger-rebuild.html">Rebuild</button>
      <button class="chip" data-src="screens-rebuild.html">Telas</button>
      <button class="chip" data-src="metas-mockup.html">Metas</button>
      <button class="chip" data-src="aevo-brand.html">Brand kit</button>
      <button class="chip" data-src="import-anim-preview.html">Anim. import</button>
    </div>
  </header>
  <div class="frameWrap loading" id="wrap">
    <div class="load">carregando…</div>
    <iframe id="frame" title="mockup"></iframe>
  </div>

<script>
  const chips = [...document.querySelectorAll('.chip[data-src]')];
  const frame = document.getElementById('frame');
  const wrap = document.getElementById('wrap');
  const openNew = document.getElementById('openNew');
  frame.addEventListener('load', () => wrap.classList.remove('loading'));
  function show(src, push){
    chips.forEach(c => c.classList.toggle('on', c.dataset.src === src));
    wrap.classList.add('loading');
    frame.src = src;
    openNew.href = src;
    if (push){ const m = src.replace(/\.html.*$/,'').replace('redesign-mockup','redesign'); try{ history.replaceState(null,'','?m='+encodeURIComponent(src)); }catch(e){} }
  }
  chips.forEach(c => c.addEventListener('click', () => show(c.dataset.src, true)));
  // deep-link opcional: ?m=<arquivo>
  const want = new URLSearchParams(location.search).get('m');
  const initial = (want && chips.some(c => c.dataset.src === want)) ? want : 'despesas-mockup.html';
  show(initial, false);
</script>
</body>
</html>
